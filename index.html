<!DOCTYPE html>
<html>
<head>
  <title>Global War News Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: #c00;
      padding: 15px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
    }

    .breaking {
      background: yellow;
      color: black;
      padding: 8px;
      font-weight: bold;
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 250px;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: black;
    }
  </style>
</head>

<body>

<header>🌍 LIVE WAR NEWS</header>

<div class="breaking">🔴 Breaking News Live Updates</div>

<div class="container" id="news"></div>

<h2 style="text-align:center;">📺 Live War Coverage</h2>

<iframe src="https://www.youtube.com/embed/21X5lGlDOfg" 
title="Live News" allowfullscreen></iframe>

<footer>© 2026 Live News | Powered by API</footer>

<script>
const API_KEY = "04211641c4774e03a8e328ef1945e048";

async function getNews() {
  const url = https://newsapi.org/v2/everything?q=war&sortBy=publishedAt&apiKey=${API_KEY};

  const res = await fetch(url);
  const data = await res.json();

  let output = "";

  data.articles.slice(0, 6).forEach(article => {
    output += `
      <div class="card">
        <img src="${article.urlToImage || 'https://via.placeholder.com/300'}">
        <div class="content">
          <div class="title">${article.title}</div>
          <p>${article.description || ''}</p>
          <a href="${article.url}" target="_blank" style="color:red;">Read More</a>
        </div>
      </div>
    `;
  });

  document.getElementById("news").innerHTML = output;
}

getNews();
</script>

</body>
</html>
